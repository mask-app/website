<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024.0" height="1024.0" viewBox="0 0 1024.0 1024.0" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
    <!-- Gradients -->
    <linearGradient id="maskGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0B1120" />
        <stop offset="100%" stop-color="#4A1D6E" />
    </linearGradient>
    
    <linearGradient id="linesGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00D4FF" />
        <stop offset="100%" stop-color="#00A3FF" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
        <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Clip Path for the Chat Bubble -->
    <clipPath id="bubbleClip">
        <path d="M 210.0 150.0
                 H 814.0
                 A 60 60 0 0 1 874.0 210.0
                 V 734.0
                 A 60 60 0 0 1 814.0 794.0
                 H 290.0
                 L 150.0 874.0
                 V 794.0
                 A 60 60 0 0 1 150.0 210.0
                 Z" />
    </clipPath>
    <clipPath id="iconClip">
        <rect x="0" y="0" width="1024.0" height="1024.0" rx="230.4" ry="230.4"/>
    </clipPath>
</defs>
<g clip-path="url(#iconClip)">
    <!-- Background (White for isolation) -->
    <rect x="0" y="0" width="1024" height="1024" fill="#FFFFFF"/>
    
    <!-- Base Chat Bubble -->
    <path d="M 230.0 150.0
            H 794.0
            A 80 80 0 0 1 874.0 230.0
            V 714.0
            A 80 80 0 0 1 794.0 794.0
            H 310.0
            L 150.0 874.0
            L 190.0 794.0
            H 230.0
            A 80 80 0 0 1 150.0 714.0
            V 230.0
            A 80 80 0 0 1 230.0 150.0
            Z" 
        fill="none" 
        stroke="#0B1120" 
        stroke-width="16" 
        stroke-linejoin="round" />
        
    <g transform="translate(0, 0)">
        <!-- Inner Chat Bubble Area (Base lines) -->
        <g clip-path="url(#bubbleClip)">
            <!-- Text Line 1 -->
            <rect x="290.0" y="310.0" width="444.0" height="32" rx="16" fill="#0B1120" opacity="0.8"/>
            <!-- Text Line 2 -->
            <rect x="290.0" y="410.0" width="524.0" height="32" rx="16" fill="#0B1120" opacity="0.8"/>
            <!-- Text Line 3 -->
            <rect x="290.0" y="510.0" width="364.0" height="32" rx="16" fill="#0B1120" opacity="0.8"/>
            <!-- Text Line 4 -->
            <rect x="290.0" y="610.0" width="484.0" height="32" rx="16" fill="#0B1120" opacity="0.8"/>
        </g>
    </g>

    <!-- The Mask (Overlapping top right, rotated) - no border now -->
    <g transform="translate(0, 0)">
        <!-- Drop Shadow group for mask -->
        <g filter="url(#dropShadow)">
            <!-- Rotated Mask Rectangle (no stroke) -->
            <g transform="translate(494.0, 110.0) rotate(15)">
                <rect x="0" y="0" width="460" height="600" rx="60" fill="url(#maskGradient)" opacity="0.9" filter="url(#glow)"/>
            </g>
        </g>
        
        <!-- 为 mask 内部蓝色横条创建缩小的裁剪区域，使其与 mask 边框保持距离 -->
        <clipPath id="maskInnerClip">
            <!-- 向内缩进 30px，宽度和高度相应减少，保持相同圆角和变换 -->
            <rect x="30" y="30" width="400" height="540" rx="60" transform="translate(494.0, 110.0) rotate(15)" />
        </clipPath>
        
        <!-- Translated Text Lines only visible inside the inner mask area, clipped to create whitespace -->
        <g clip-path="url(#maskInnerClip)">
            <!-- Text Line 1 (same positions as base lines) -->
            <rect x="290.0" y="310.0" width="444.0" height="32" rx="16" fill="#00D4FF"/>
            <!-- Text Line 2 -->
            <rect x="290.0" y="410.0" width="524.0" height="32" rx="16" fill="#00D4FF"/>
            <!-- Text Line 3 -->
            <rect x="290.0" y="510.0" width="364.0" height="32" rx="16" fill="#00D4FF"/>
            <!-- Text Line 4 -->
            <rect x="290.0" y="610.0" width="484.0" height="32" rx="16" fill="#00D4FF"/>
        </g>
    </g>
</g>
</svg>
