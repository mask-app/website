      <h1>Mask 隐私政策</h1>
      <p>生效日期：2026-03-06</p>
      <h2>1. 数据处理原则</h2>
      <p>Mask 以本地处理优先。OCR 与主要视觉理解流程在设备本地完成，默认不上传原始图像内容。</p>
      <h2>2. 可能上传的数据</h2>
      <p>当你手动选择云端翻译提供商时，必要文本请求会发送到你配置的第三方 API 服务。你可随时切换到本地模式。</p>
      <h2>3. 凭据存储</h2>
      <p>API Key 建议存储在系统安全存储（如 Keychain）中，不建议明文保存。</p>
      <h2>4. 联系方式</h2>
      <p>如有隐私问题，请联系：<a href="mailto:hello@mask-app.com">hello@mask-app.com</a></p>
      <p><a href="/">返回首页</a></p>
    </main>
  </body>
